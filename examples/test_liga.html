<!DOCTYPE html>
<html>

<head>
    <style>
        @font-face {
            font-family: 'CoolFont';
            src: url('noto_sans_mono_cool.ttf');
        }

        body {
            font-family: 'CoolFont';
            font-size: 72px;
            font-feature-settings: "liga" 1;
        }

        .dark {
            background: black;
            color: white;
        }

        .light {
            background: white;
            color: black;
        }

        .red {
            background: red;
            color: black;
        }

        #toggle-btn {
            font-family: sans-serif;
            font-size: 16px;
            padding: 8px 16px;
            margin-bottom: 16px;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <button id="toggle-btn" onclick="toggleLiga()">Disable Ligatures</button>
    <p class="light">Fonts are cool!</p>
    <p class="light">I have never been to <a href="https://en.wikipedia.org/wiki/Tarcoola,_South_Australia"
            target="_blank">Tarcoola</a>.</p>
    <p class="dark">Fonts are cool!</p>
    <p class="dark">I have never been to <a href="https://en.wikipedia.org/wiki/Tarcoola,_South_Australia"
            target="_blank">Tarcoola</a>.
    </p>
    <script>
        let ligaOn = true;
        function toggleLiga() {
            ligaOn = !ligaOn;
            document.body.style.fontFeatureSettings = ligaOn ? '"liga" 1' : '"liga" 0';
            document.getElementById('toggle-btn').textContent =
                ligaOn ? 'Disable Ligatures' : 'Enable Ligatures';
        }
    </script>
</body>

</html>
