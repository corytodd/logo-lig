<!DOCTYPE html>
<html>

<head>
    <style>
        @font-face {
            font-family: 'TestFont';
            src: url('noto_sans_mono_219.ttf');
        }

        body {
            font-family: 'TestFont';
            font-size: 72px;
            font-feature-settings: "liga" 1;
        }

        .dark {
            background: black;
            color: white;
        }

        .light {
            background: white;
            color: black;
        }

        .red {
            background: red;
            color: black;
        }

        #toggle-btn {
            font-family: sans-serif;
            font-size: 16px;
            padding: 8px 16px;
            margin-bottom: 16px;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <button id="toggle-btn" onclick="toggleLiga()">Disable Ligatures</button>
    <p class="light">light: 219</p>
    <p class="dark">dark: 219</p>
    <p class="red">red: 219</p>
    <p class="light">light: 1219</p>
    <p class="dark">dark: 12191</p>
    <p class="red">red: 2191</p>
    <p class="red">red: a219</p>
    <script>
        let ligaOn = true;
        function toggleLiga() {
            ligaOn = !ligaOn;
            document.body.style.fontFeatureSettings = ligaOn ? '"liga" 1' : '"liga" 0';
            document.getElementById('toggle-btn').textContent =
                ligaOn ? 'Disable Ligatures' : 'Enable Ligatures';
        }
    </script>
</body>

</html>
