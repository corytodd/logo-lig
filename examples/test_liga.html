<!DOCTYPE html>
<html>

<head>
    <style>
        @font-face {
            font-family: 'TestFont';
            src: url('noto_sans_mono_219.ttf');
        }

        body {
            font-size: 72px;
            font-family: 'TestFont';
            font-feature-settings: "liga" 1;
        }

        .dark {
            background: black;
            color: white;
        }

        .light {
            background: white;
            color: black;
        }

        .red {
            background: red;
            color: black;
        }
    </style>
</head>

<body>
    <p class="light">light: 219</p>
    <p class="dark">dark: 219</p>
    <p class="red">red: 219</p>
</body>

</html>
